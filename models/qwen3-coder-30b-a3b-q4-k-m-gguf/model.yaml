id: qwen3-coder-30b-a3b-q4-k-m-gguf
name: 30b-a3b

description: |
  Qwen3 Coder is a code-focused mixture-of-experts model with 30B total
  parameters and 3B active parameters per token, optimised for code generation,
  completion, and reasoning tasks. This variant uses Q4_K_M quantization for a
  balance of performance and efficiency.
model-card-url: https://huggingface.co/inference-snaps/Qwen3-Coder-30B-A3B-Instruct-GGUF-Q4_K_M-5GB
quantization: Q4_K_M

disk-size: 18G

capabilities:
  - text
  - thinking
  - tools

components:
  - model-qwen3-coder-30b-a3b-q4-k-m-1-of-4
  - model-qwen3-coder-30b-a3b-q4-k-m-2-of-4
  - model-qwen3-coder-30b-a3b-q4-k-m-3-of-4
  - model-qwen3-coder-30b-a3b-q4-k-m-4-of-4

environment:
  # The model is split into multiple shards, maintained in individual component directories.
  # However, llama-server expects the shards to be located in the same directory.
  # The layout below flattens them into a single directory via symlinks.
  # The model file path is set to the first shard's symlink:
  - MODEL_NAME=qwen3-coder-30b-a3b-q4-k-m
  - SHARDS_DIR=/tmp/model-qwen3-coder-30b-a3b-q4-k-m-gguf-shards
  - MODEL_FILE=$SHARDS_DIR/Qwen3-Coder-30B-A3B-Instruct-Q4_K_M-00001-of-00004.gguf

layout:
  $SHARDS_DIR/Qwen3-Coder-30B-A3B-Instruct-Q4_K_M-00001-of-00004.gguf:
    symlink: $SNAP_COMPONENTS/model-qwen3-coder-30b-a3b-q4-k-m-1-of-4/Qwen3-Coder-30B-A3B-Instruct-Q4_K_M-00001-of-00004.gguf
  $SHARDS_DIR/Qwen3-Coder-30B-A3B-Instruct-Q4_K_M-00002-of-00004.gguf:
    symlink: $SNAP_COMPONENTS/model-qwen3-coder-30b-a3b-q4-k-m-2-of-4/Qwen3-Coder-30B-A3B-Instruct-Q4_K_M-00002-of-00004.gguf
  $SHARDS_DIR/Qwen3-Coder-30B-A3B-Instruct-Q4_K_M-00003-of-00004.gguf:
    symlink: $SNAP_COMPONENTS/model-qwen3-coder-30b-a3b-q4-k-m-3-of-4/Qwen3-Coder-30B-A3B-Instruct-Q4_K_M-00003-of-00004.gguf
  $SHARDS_DIR/Qwen3-Coder-30B-A3B-Instruct-Q4_K_M-00004-of-00004.gguf:
    symlink: $SNAP_COMPONENTS/model-qwen3-coder-30b-a3b-q4-k-m-4-of-4/Qwen3-Coder-30B-A3B-Instruct-Q4_K_M-00004-of-00004.gguf
